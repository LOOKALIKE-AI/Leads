name: Daily Leads Scrape

on:
  schedule:
    - cron: "17 4 * * *"   # avoid top of hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run scripts
        run: |
          uv run google_search.py
          uv run main.py

      - name: Commit updated CSV files
        run: |
          if git status --porcelain | grep -E "brands.csv|leads.csv"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add brands.csv leads.csv
            git commit -m "Daily update: brands and leads"
            git push
          else
            echo "No changes to CSV files"
          fi

name: Daily Leads Scrape

on:
  schedule:
    - cron: '17 4 * * *' # runs everyday at 17 past 4 A:M UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run google search and lead processing
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          uv run google_search.py
          uv run main.py

      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "chore(data): refresh brands and leads using GitHub Actions" || echo "No changes to commit"
          git push
